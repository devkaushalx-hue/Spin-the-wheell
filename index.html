<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NDR Lucky Business Spin | Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #b8860b;
            --black: #0a0a0a;
            --surface: #1a1a1a;
        }

        body {
            background-color: var(--black);
            background-image: radial-gradient(circle at center, #222 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { margin-top: 25px; text-align: center; }
        h1 { color: var(--gold); font-size: 26px; text-transform: uppercase; margin-bottom: 5px; }
        
        .input-container {
            margin: 20px 0;
            width: 90%;
            max-width: 400px;
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 6px;
            border: 2px solid #333;
            background: #000;
            color: var(--gold);
            font-size: 18px;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        .spin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            border-radius: 6px;
            color: black;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .wheel-wrapper {
            position: relative;
            width: 390px;
            height: 390px;
            margin: 20px auto;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            z-index: 100;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        canvas { width: 100%; height: 100%; }

        #result-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 999;
        }

        .claim-btn {
            background: #25D366;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>NDR Lucky Business Spin</h1>
    <div style="color: #888;">Minimum Order ₹200</div>
</div>

<div class="input-container">
    <input type="tel" id="phoneInput" placeholder="Enter 10-Digit Mobile" maxlength="10">
    <button class="spin-btn" id="spinBtn" onclick="initiateSpin()">Spin Now</button>
</div>

<div class="wheel-wrapper">
    <svg class="pointer" viewBox="0 0 50 50">
        <path d="M25 50 L5 10 A20 20 0 1 1 45 10 Z" fill="#ff0000" stroke="white" stroke-width="2"/>
    </svg>
    <canvas id="wheelCanvas" width="800" height="800"></canvas>
</div>

<div class="overlay" id="overlay"></div>
<div id="result-modal">
    <h2 style="margin:0">🎉 YOU WON!</h2>
    <div id="winningPrizeText" style="font-size: 18px; margin: 15px 0; font-weight: bold; color: #b8860b;"></div>
    <p style="font-size: 14px;">Screenshot this screen to claim!</p>
    <a id="whatsappLink" href="#" class="claim-btn">Claim via WhatsApp</a>
    <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; color:#666; cursor:pointer;">Try Again (Admin Only)</button>
</div>

<script>
    const ADMIN_NUMBER = "9653431118";
    const CLAIM_NUMBER = "9988870674";

    const prizes = [
        { main: "Mini Branding Combo", sub: "Was ₹450 → Now ₹249", color: "#FFD700", text: "#000" },
        { main: "Free Logo", sub: "With 1 Pamphlet Order (₹200)", color: "#000", text: "#FFD700" },
        { main: "₹70 OFF Combo", sub: "Logo+Pamphlet (₹300 → ₹230)", color: "#FFD700", text: "#000" },
        { main: "20% OFF Pamphlet", sub: "Save ₹40 (₹200 → ₹160)", color: "#000", text: "#FFD700" },
        { main: "NDR Golden Ticket", sub: "₹30 OFF Instantly Confirmed", color: "#FFD700", text: "#000" },
        { main: "Extra Design", sub: "1 Extra Variation FREE", color: "#000", text: "#FFD700" }
    ];

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;
    let isSpinning = false;

    function draw() {
        const size = canvas.width;
        const center = size / 2;
        const radius = center - 15;
        const sliceAngle = (Math.PI * 2) / prizes.length;

        ctx.clearRect(0, 0, size, size);

        prizes.forEach((p, i) => {
            const ang = i * sliceAngle + currentRotation;
            
            // Draw Slice
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, radius, ang, ang + sliceAngle);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.strokeStyle = "#444";
            ctx.stroke();

            // Draw Text
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(ang + sliceAngle / 2);
            ctx.textAlign = "right";
            
            ctx.fillStyle = p.text;
            ctx.font = "bold 28px Arial";
            ctx.fillText(p.main, radius - 40, -10);
            
            ctx.font = "20px Arial";
            ctx.fillText(p.sub, radius - 40, 25);
            ctx.restore();
        });

        // Outer Ring
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.strokeStyle = "#FFD700";
        ctx.lineWidth = 10;
        ctx.stroke();
    }

    function initiateSpin() {
        const phone = document.getElementById('phoneInput').value;
        if (phone.length < 10) return alert("Enter 10-digit number");
        if (phone !== ADMIN_NUMBER && localStorage.getItem('ndr_done')) return alert("One spin per day!");
        if (isSpinning) return;

        isSpinning = true;
        const duration = 6000;
        const startTime = performance.now();
        const startRotation = currentRotation;
        const totalSpin = (Math.PI * 2 * 12) + (Math.random() * Math.PI * 2);

        function animate(now) {
            const elapsed = now - startTime;
            const t = Math.min(elapsed / duration, 1);
            const easeOut = 1 - Math.pow(1 - t, 4); // Quartic Ease Out

            currentRotation = startRotation + (totalSpin * easeOut);
            draw();

            if (t < 1) requestAnimationFrame(animate);
            else finishSpin();
        }
        requestAnimationFrame(animate);
    }

    function finishSpin() {
        isSpinning = false;
        const phone = document.getElementById('phoneInput').value;
        if (phone !== ADMIN_NUMBER) localStorage.setItem('ndr_done', 'true');

        const sliceSize = (Math.PI * 2) / prizes.length;
        const normalized = (currentRotation % (Math.PI * 2));
        const index = Math.floor((prizes.length - (normalized / sliceSize) - 1.5 + prizes.length) % prizes.length);
        
        const win = prizes[index];
        const fullResult = `${win.main} (${win.sub})`;

        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors:['#FFD700','#000'] });

        document.getElementById('winningPrizeText').innerText = fullResult;
        document.getElementById('whatsappLink').href = `https://wa.me/91${CLAIM_NUMBER}?text=I won ${encodeURIComponent(fullResult)}`;
        
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }, 800);
    }

    draw();
</script>
</body>
</html>
